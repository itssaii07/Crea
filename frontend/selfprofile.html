<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>crèa self-profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

  <style>
    /* force all visible text to appear lowercase */
    * {
      text-transform: lowercase !important;
    }

    body {
      font-family: 'Poppins', sans-serif;
      overscroll-behavior-y: contain;
      text-transform: lowercase !important;
    }

    .fade-in {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .img-hover:hover {
      transform: scale(1.05);
      transition: transform 0.4s ease;
      cursor: pointer;
    }

    .keywordBtn:hover {
      background: #a63a00;
      color: white;
      transform: scale(1.05);
      transition: all 0.3s ease;
    }

    .ts-control {
      border: 1px solid #d1d5db !important;
      border-radius: 0.5rem !important;
      padding: 0.5rem !important;
    }
  </style>

</head>

<body class="bg-gradient-to-br from-[#f3f0e7] to-[#f8efe2] min-h-screen text-gray-800">

  <!-- Header -->
  <div class="px-6 md:px-12 py-4 flex justify-between items-center">
    <button id="backButton"
      class="text-white bg-[#a63a00] px-4 py-2 rounded-full shadow-md hover:shadow-lg hover:bg-[#872f00] transition flex items-center gap-2">
      <i class="fas fa-arrow-left"></i><span>back</span>
    </button>
    <div class="flex gap-2">
      <button id="resetBtn" onclick="resetProfile()"
        class="hidden text-red-600 border border-red-600 px-4 py-2 rounded-full shadow-md hover:bg-red-600 hover:text-white transition">
        reset profile
      </button>
      <button id="editBtn" onclick="toggleEdit()"
        class="text-[#a63a00] border border-[#a63a00] px-4 py-2 rounded-full shadow-md hover:bg-[#a63a00] hover:text-white transition">
        edit profile
      </button>
    </div>
  </div>

  <!-- Profile Section -->
  <section class="max-w-5xl mx-auto px-4 md:px-8 mt-6 fade-in">
    <div
      class="flex flex-col md:flex-row items-center md:items-start md:space-x-10 bg-white/40 backdrop-blur-lg p-6 rounded-2xl shadow-lg">

      <!-- Left: Avatar + Bio -->
      <div class="flex flex-col items-center md:items-start text-center md:text-left">
        <div class="relative profile-wrapper rounded-full shadow-lg hover:shadow-xl transition">
          <img id="profilePic" src="p1.png" alt="profile picture of @mudhands_art"
            class="w-36 h-36 rounded-full object-cover border-4 border-[#a63a00]" />
          <input id="profilePicInput" type="file" accept="image/*"
            class="hidden absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer"
            onchange="previewProfilePic(event)" />
          <input id="profilePicUrl" type="hidden" value="" />
        </div>

        <p id="usernameText" class="text-[#a63a00] font-semibold text-sm mt-2 select-none">@mudhands_art</p>
        <input id="usernameInput" type="text" value="@mudhands_art"
          class="hidden mt-2 w-60 text-sm p-2 border rounded-lg focus:ring-[#a63a00]" />

        <p id="bioText" class="mt-2 max-w-xs text-sm text-gray-600 leading-relaxed">
          hi! i'm a passionate artist creating handmade pieces filled with love and detail. let's bring imagination to
          life together 💫
        </p>
        <textarea id="bioInput" class="hidden mt-2 w-80 h-32 text-sm p-2 border rounded-lg focus:ring-[#a63a00]"
          rows="5"></textarea>
      </div>

      <!-- Right: Stats + Categories + Keywords -->
      <div class="flex flex-col items-center md:items-start mt-6 md:mt-0 w-full md:w-auto space-y-4">
        <div class="flex space-x-8 justify-center md:justify-start">
          <div class="text-center">
            <p id="orders-count" class="text-xl font-bold text-[#a63a00]">0</p>
            <p class="text-sm text-gray-600">orders</p>
          </div>
          <div class="text-center">
            <p id="creations-count" class="text-xl font-bold text-[#a63a00]">0</p>
            <p class="text-sm text-gray-600">creations</p>
          </div>
          <div class="text-center">
            <p id="experience-count" class="text-xl font-bold text-[#a63a00]">0 yrs</p>
            <p class="text-sm text-gray-600">experience</p>
          </div>
        </div>

        <!-- Category -->
        <div id="categoryView" class="text-sm text-gray-700">
          <span class="font-semibold">category:</span>
          <span id="categoryText" class="ml-2 text-gray-700">not specified</span>
          <div id="categoryChips" class="inline-flex flex-wrap gap-2 ml-3"></div>
        </div>
        <div id="categoryEdit" class="hidden w-full">
          <select id="categorySelect" multiple>
            <option>air dry clay toy making</option>
            <option>basket weaving</option>
            <option>beadwork</option>
            <option>calligraphy</option>
            <option>candle making</option>
            <option>clothes</option>
            <option>collage art</option>
            <option>crochet</option>
            <option>decoupage</option>
            <option>digital art</option>
            <option>drawing</option>
            <option>embroidery</option>
            <option>fabric painting</option>
            <option>flower pressing & leaf art</option>
            <option>folk art</option>
            <option>furniture</option>
            <option>glass art</option>
            <option>glass etching</option>
            <option>graffiti (traditional)</option>
            <option>henna / mehndi art</option>
            <option>jewellery</option>
            <option>knitting</option>
            <option>leather craft</option>
            <option>macrame</option>
            <option>metalworking</option>
            <option>miniature arts</option>
            <option>mixed media art</option>
            <option>mosaic art</option>
            <option>nature crafts</option>
            <option>origami</option>
            <option>painting</option>
            <option>papier-mâché</option>
            <option>paper marbling</option>
            <option>phone cases</option>
            <option>portraits</option>
            <option>pottery</option>
            <option>pyrography</option>
            <option>quilling</option>
            <option>quilting</option>
            <option>resin art</option>
            <option>rugs</option>
            <option>scrapbooking</option>
            <option>scrimshaw</option>
            <option>sculpting</option>
            <option>shell art</option>
            <option>soap making</option>
            <option>stained glass art</option>
            <option>string art</option>
            <option>t-shirt art</option>
            <option>upcycled art</option>
            <option>wall hangings</option>
            <option>wood carving</option>
            <option>others</option>
          </select>
        </div>

        <!-- Keywords -->
        <div id="keywordsView" class="flex flex-wrap gap-2 justify-center md:justify-start">
        </div>
        <div id="keywordsEdit" class="hidden w-full">
          <div id="keywordsContainer" class="flex flex-wrap gap-2 mb-2"></div>
          <div class="flex gap-2">
            <input id="keywordInput" type="text" class="flex-1 p-2 border rounded-lg focus:ring-[#a63a00]"
              placeholder="add keyword" />
            <button type="button" onclick="addKeyword()"
              class="bg-[#a63a00] text-white px-3 py-1 rounded-lg hover:bg-[#872f00] shadow-md">add</button>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Creations Section -->
  <section class="max-w-5xl mx-auto px-4 md:px-8 mt-10 fade-in">
    <h2 class="text-lg font-semibold text-[#a63a00] mb-4">creations</h2>
    <div id="creationsGallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">

    </div>
    <div id="addCreationBox" class="hidden mt-4">
      <input type="file" id="creationImageInput" accept="image/*" class="mb-2" />
      <input type="text" id="creationCaptionInput" placeholder="enter caption..."
        class="w-full p-2 border rounded-lg mb-2 focus:ring-[#a63a00]" />
      <button onclick="addCreation()"
        class="bg-[#a63a00] text-white px-4 py-2 rounded-lg hover:bg-[#872f00] shadow-md">add creation</button>
    </div>
  </section>

  <!-- Social Links -->
  <section class="max-w-5xl mx-auto px-4 md:px-8 mt-10 pb-10 fade-in">
    <h2 class="text-lg font-semibold text-[#a63a00] mb-4">social links</h2>
    <div id="socialLinksView" class="space-y-2">
      <p class="text-sm text-gray-700 flex items-center gap-2">
        <i class="fas fa-globe text-[#a63a00]"></i>
        website: <a id="websiteLink" href="#" target="_blank" class="text-[#a63a00] underline">not provided</a>
      </p>
      <p class="text-sm text-gray-700 flex items-center gap-2">
        <i class="fab fa-instagram text-[#a63a00]"></i>
        instagram: <a id="instagramLink" href="#" target="_blank" class="text-[#a63a00] underline">not provided</a>
      </p>
    </div>
    <div id="socialLinksEdit" class="hidden space-y-2 mt-2">
      <input id="websiteInput" type="url" placeholder="enter website url"
        class="w-full p-2 border rounded-lg focus:ring-[#a63a00]" />
      <input id="instagramInput" type="url" placeholder="enter instagram url"
        class="w-full p-2 border rounded-lg focus:ring-[#a63a00]" />
    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden cursor-pointer"
    onclick="closeLightbox()">
    <span class="absolute top-4 right-6 text-white text-4xl font-bold cursor-pointer"
      onclick="event.stopPropagation(); closeLightbox();">&times;</span>
    <img id="lightboxImage" src="" alt="preview" class="max-w-[90vw] max-h-[90vh] object-contain cursor-default"
      onclick="event.stopPropagation()">
  </div>

  <script type="module">
    import authService from './js/auth.js';

    let isEditing = false;
    let keywords = [];
    let categorySelectInstance;
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async function () {
      currentUser = await authService.getCurrentUser();
      if (!currentUser) {
        window.location.href = 'auth.html';
        return;
      }

      initializePage();
      await loadProfile();

      document.getElementById('backButton').addEventListener('click', () => {
        history.back();
      });
    });

    async function loadProfile() {
      try {
        const response = await authService.apiCall('/api/user/profile');

        if (response.ok) {
          const profile = await response.json();
          updateUI(profile);
        }
      } catch (error) {
        console.error('Error loading profile:', error);
      }
    }

    function ensureProtocol(url) {
      if (!url || url === '#') return '#';
      if (!/^https?:\/\//i.test(url)) {
        return `https://${url}`;
      }
      return url;
    }

    function updateUI(profile) {
      document.getElementById('usernameText').innerText = profile.username || '';
      document.getElementById('usernameInput').value = profile.username || '';
      document.getElementById('bioText').innerText = profile.bio || '';
      document.getElementById('bioInput').value = profile.bio || '';
      document.getElementById('profilePic').src = profile.profilePicUrl || 'p1.png';
      document.getElementById('profilePicUrl').value = profile.profilePicUrl || '';
      document.getElementById('websiteLink').href = ensureProtocol(profile.links?.website);
      document.getElementById('websiteLink').textContent = profile.links?.website || 'not provided';
      document.getElementById('instagramLink').href = ensureProtocol(profile.links?.instagram);
      document.getElementById('instagramLink').textContent = profile.links?.instagram || 'not provided';
      document.getElementById('websiteInput').value = profile.links?.website || '';
      document.getElementById('instagramInput').value = profile.links?.instagram || '';

      renderCategoryChips(profile.categories || []);
      categorySelectInstance.clear();
      if (profile.categories) {
        categorySelectInstance.addItems(profile.categories);
      }

      keywords = profile.keywords || [];
      renderKeywordsView();
      renderKeywordsEdit();

      const creationsGallery = document.getElementById('creationsGallery');
      creationsGallery.innerHTML = '';
      if (profile.creationsGallery) {
        profile.creationsGallery.forEach((creation, index) => {
          creationsGallery.innerHTML += `
                    <div class="fade-in relative">
                        <div class="aspect-square bg-white/60 backdrop-blur-md rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
                            <img src="${creation.imageUrl || creation.url}" alt="${creation.title || creation.caption || ''}" class="w-full h-full object-cover img-hover" onclick="openLightbox(this)" />
                        </div>
                        <p class="text-sm text-gray-700 mt-2">${creation.title || creation.caption || ''}</p>
                        <button class="remove-creation-btn absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hidden" data-index="${index}" onclick="removeCreation(${index})">
                            <i class="fas fa-times"></i>
                        </button>
                        <button class="remove-creation-btn absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hidden" onclick="window.removeCreation(${index})">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
        });
        // Re-apply hidden class if not editing
        const removeButtons = document.querySelectorAll('.remove-creation-btn');
        removeButtons.forEach(btn => {
          btn.classList.toggle('hidden', !isEditing);
        });
      }

      document.getElementById('orders-count').textContent = profile.user?.stats?.orders || 0;
      document.getElementById('creations-count').textContent = profile.user?.stats?.creations || 0;
      const experienceMs = profile.user?.stats?.experience || 0;
      const years = Math.floor(experienceMs / 31536000000); // Approximate ms in a year (1000 * 60 * 60 * 24 * 365)
      document.getElementById('experience-count').textContent = `${years} yrs`;
    }

    function initializePage() {
      categorySelectInstance = new TomSelect("#categorySelect", {
        plugins: ['remove_button'],
        persist: false,
        create: false
      });
    }

    window.toggleEdit = function () {
      isEditing = !isEditing;

      const editBtn = document.getElementById('editBtn');
      const resetBtn = document.getElementById('resetBtn');

      editBtn.textContent = isEditing ? "save changes" : "edit profile";
      resetBtn.classList.toggle('hidden', !isEditing);

      document.getElementById('usernameText').classList.toggle('hidden', isEditing);
      document.getElementById('usernameInput').classList.toggle('hidden', !isEditing);
      document.getElementById('bioText').classList.toggle('hidden', isEditing);
      document.getElementById('bioInput').classList.toggle('hidden', !isEditing);
      document.getElementById('categoryView').classList.toggle('hidden', isEditing);
      document.getElementById('categoryEdit').classList.toggle('hidden', !isEditing);
      document.getElementById('keywordsView').classList.toggle('hidden', isEditing);
      document.getElementById('keywordsEdit').classList.toggle('hidden', !isEditing);
      document.getElementById('socialLinksView').classList.toggle('hidden', isEditing);
      document.getElementById('socialLinksEdit').classList.toggle('hidden', !isEditing);
      document.getElementById('addCreationBox').classList.toggle('hidden', !isEditing);
      document.getElementById('profilePicInput').classList.toggle('hidden', !isEditing);

      // Show/hide remove buttons
      const removeButtons = document.querySelectorAll('.remove-creation-btn');
      removeButtons.forEach(btn => {
        btn.classList.toggle('hidden', !isEditing);
      });

      if (!isEditing) {
        saveProfile();
      }
    }

    async function saveProfile() {
      const creations = Array.from(document.getElementById('creationsGallery').children).map(creation => {
        const img = creation.querySelector('img');
        const caption = creation.querySelector('p');
        return {
          imageUrl: img ? img.src : '',
          title: caption ? caption.textContent : ''
        };
      });

      const profileData = {
        username: document.getElementById('usernameInput').value,
        bio: document.getElementById('bioInput').value,
        categories: categorySelectInstance.getValue(),
        keywords: keywords,
        links: {
          website: document.getElementById('websiteInput').value,
          instagram: document.getElementById('instagramInput').value
        },
        profilePicUrl: document.getElementById('profilePicUrl').value,
        creationsGallery: creations
      };

      try {
        const response = await authService.apiCall('/api/user/profile', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(profileData)
        });

        if (response.ok) {
          const profile = await response.json();
          updateUI(profile);
        } else {
          const error = await response.json();
          alert(error.error || 'Failed to save profile');
        }
      } catch (error) {
        console.error('Error saving profile:', error);
      }
    }

    window.previewProfilePic = async function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('avatar', file);

      try {
        // Get token directly from localStorage
        const token = localStorage.getItem('token');
        if (!token) {
          alert('Please log in to upload images');
          return;
        }

        const response = await fetch('/api/upload/avatar', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`
          },
          body: formData
        });

        if (response.ok) {
          const result = await response.json();
          document.getElementById('profilePic').src = result.url;
          document.getElementById('profilePicUrl').value = result.url;
        } else {
          alert('Failed to upload image');
        }
      } catch (error) {
        console.error('Error uploading image:', error);
      }
    }

    window.addCreation = async function () {
      const fileInput = document.getElementById('creationImageInput');
      const captionInput = document.getElementById('creationCaptionInput');
      const file = fileInput.files[0];
      const caption = captionInput.value;

      if (!file) return;

      const formData = new FormData();
      formData.append('image', file);
      formData.append('bucket', 'creations');

      try {
        // Get token directly from localStorage
        const token = localStorage.getItem('token');
        if (!token) {
          alert('Please log in to upload images');
          return;
        }

        const response = await fetch('/api/upload/image', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`
          },
          body: formData
        });

        if (response.ok) {
          const result = await response.json();

          // Add logic to add to gallery locally or saveProfile?
          // For now, let's just add it to the UI and let saveProfile handle persisting strictly the gallery state if needed,
          // BUT wait, saveProfile saves the CURRENT DOM state of gallery.
          // So we must append to DOM first.

          const gallery = document.getElementById('creationsGallery');
          // Calculate next index
          const nextIndex = gallery.children.length;

          const newCreationHtml = `
                    <div class="fade-in relative">
                        <div class="aspect-square bg-white/60 backdrop-blur-md rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
                            <img src="${result.url}" alt="${caption}" class="w-full h-full object-cover img-hover" onclick="openLightbox(this)" />
                        </div>
                        <p class="text-sm text-gray-700 mt-2">${caption}</p>
                         <button class="remove-creation-btn absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs" onclick="window.removeCreation(${nextIndex})">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
          gallery.insertAdjacentHTML('beforeend', newCreationHtml);

          fileInput.value = '';
          captionInput.value = '';
        } else {
          alert('Failed to upload image');
        }
      } catch (error) {
        console.error('Error uploading image:', error);
      }
    }

    function renderCategoryChips(categories) {
      const textSpan = document.getElementById('categoryText');
      const container = document.getElementById('categoryChips');
      if (!container || !textSpan) return;
      container.innerHTML = '';

      if (!categories || !categories.length) {
        textSpan.textContent = 'not specified';
        textSpan.classList.remove('hidden');
        return;
      }

      textSpan.textContent = '';
      textSpan.classList.add('hidden');
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = "keywordBtn text-sm text-[#a63a00] bg-white border border-[#a63a00] px-3 py-1 rounded-full shadow-sm";
        btn.textContent = cat;
        container.appendChild(btn);
      });
    }

    function renderKeywordsView() {
      const container = document.getElementById('keywordsView');
      if (!container) return;
      container.innerHTML = '';
      keywords.forEach(word => {
        const btn = document.createElement('button');
        btn.className = "keywordBtn text-sm text-[#a63a00] bg-white border border-[#a63a00] px-3 py-1 rounded-full shadow-sm";
        btn.textContent = `#${word}`;
        container.appendChild(btn);
      });
    }

    function renderKeywordsEdit() {
      const container = document.getElementById('keywordsContainer');
      if (!container) return;
      container.innerHTML = '';
      keywords.forEach((word, idx) => {
        const btn = document.createElement('button');
        btn.className = "keywordBtn text-sm text-[#a63a00] bg-white border border-[#a63a00] px-3 py-1 rounded-full shadow-sm";
        btn.textContent = `#${word}`;
        btn.title = "click to remove";
        btn.dataset.index = idx;
        btn.addEventListener('click', () => {
          keywords.splice(btn.dataset.index, 1);
          renderKeywordsEdit();
        });
        container.appendChild(btn);
      });
    }

    window.addKeyword = function () {
      const input = document.getElementById('keywordInput');
      const raw = (input.value || '').trim().toLowerCase();
      if (!raw) return;
      if (!keywords.some(k => k.toLowerCase() === raw.toLowerCase())) {
        keywords.push(raw);
        renderKeywordsEdit();
      }
      input.value = '';
      input.focus();
    }

    window.openLightbox = function (img) {
      document.getElementById('lightbox').classList.remove('hidden');
      document.getElementById('lightboxImage').src = img.src;
    }
    window.closeLightbox = function () {
      document.getElementById('lightbox').classList.add('hidden');
    }

    window.removeCreation = function (index) {
      if (confirm('Are you sure you want to remove this creation?')) {
        const creationsGallery = document.getElementById('creationsGallery');
        const creationDiv = creationsGallery.children[index];
        if (creationDiv) {
          creationDiv.remove();
          saveProfile(); // Save the updated profile to update stats
        }
      }
    }
  </script>
</body>

</html>
