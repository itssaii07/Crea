<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>crèa requests</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        /* force all visible text to appear lowercase */
        * {
            text-transform: lowercase !important;
        }

        :root {
            --brand: #a63a00;
            --brand-dark: #8c2e00;
            --bg: #f3f1ec;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
        }

        /* --- NAVBAR STYLES (FROM EXPLORE.HTML) --- */
        header {
            z-index: 9999;
        }

        #navbar {
            top: 60px;
            opacity: 1;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        #navbar.hide {
            transform: translate(-50%, -140%);
            opacity: 0;
        }

        #navbar.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        @media (prefers-reduced-motion: reduce) {
            #navbar {
                transition: none;
            }
        }

        /* --- END NAVBAR STYLES --- */

        .notification-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff4d4d;
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
        }

        /* LAYOUT */
        .content-wrapper {
            margin-top: 160px;
            width: 90%;
            margin-inline: auto;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .filter-bar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 21%;
            flex-shrink: 0;
        }

        .filter-bar input[type="text"],
        .filter-bar select,
        .filter-bar input[type="number"] {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 100%;
            transition: .3s;
            font-size: .9em;
            background: #fff;
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(166, 58, 0, .2);
        }

        .filter-bar button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: .9em;
            width: 100%;
            cursor: pointer;
            transition: .2s;
            background: #f0d9c4;
            color: var(--brand);
            font-weight: 500;
        }

        .filter-bar button.selected {
            background: #d4b199;
        }

        .filter-bar .apply-btn {
            background: var(--brand);
            color: #fff;
            font-size: 1em;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 5px;
        }

        .filter-bar .apply-btn:hover {
            background: var(--brand-dark);
        }

        .filter-bar .clear-btn {
            background: #e5e7eb;
            color: #111827;
        }

        .cards-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            width: 78%;
        }

        @media (min-width:768px) {
            .cards-container {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width:1024px) {
            .cards-container {
                grid-template-columns: 1fr;
            }
        }

        /* CARD */
        .card {
            background: #fff;
            border-radius: 12px;
            display: flex;
            padding: 14px;
            transition: .3s;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, .05);
            align-items: center;
        }

        .card:hover {
            box-shadow: 0 4px 15px rgba(0, 0, 0, .12);
            transform: translateY(-2px);
        }

        .card.own-request {
            background: #ffe7d9;
        }

        .card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .category-badge {
            display: inline-block;
            background: #f0d9c4;
            color: var(--brand);
            font-size: .7em;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 9999px;
            margin-bottom: 4px;
            width: fit-content;
            white-space: nowrap;
        }

        .card h4 {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card p {
            font-size: .85em;
            color: #666;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .price {
            font-weight: 700;
            color: #16a34a;
        }

        /* FAB */
        .plus-button {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: linear-gradient(135deg, #ff5e1a, var(--brand));
            color: #fff;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: transform .2s ease;
        }

        .plus-button:hover {
            transform: scale(1.08) rotate(90deg);
        }

        .plus-button:active {
            transform: scale(1.04) rotate(90deg);
        }

        /* MODALS */
        .modal,
        .modal-description {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            justify-content: center;
            align-items: center;
            z-index: 10010;
            padding: 16px;
        }

        /* modal content: limit height and allow internal scrolling */
        .modal-content,
        .modal-description-content {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .15);

            /* <- NEW: prevent modal from growing past viewport */
            max-height: calc(100vh - 80px);
            /* keeps modal within viewport */
            overflow-y: auto;
            /* scroll inside modal if needed */

            /* layout so sticky footer can work */
            display: flex;
            flex-direction: column;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: 'Poppins', sans-serif;
            transition: .3s;
        }

        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(166, 58, 0, .2);
        }

        .modal-content button,
        .modal-description-content button {
            background: var(--brand);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: .3s;
            margin-top: 8px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
        }

        .modal-content button:hover,
        .modal-description-content button:hover {
            background: var(--brand-dark);
            transform: translateY(-1px);
        }

        /* Distance block */
        .distance-filter {
            margin-top: 10px;
            background: #f9f7f3;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e0d9cf;
        }

        .distance-filter label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: .9em;
        }

        .distance-inputs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .distance-inputs input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 50%;
            transition: .3s;
            font-size: .85em;
        }

        .distance-inputs input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(166, 58, 0, .2);
        }

        .distance-slider {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            appearance: none;
            background: #ddd;
            outline: none;
            border-radius: 5px;
        }

        .distance-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--brand);
            cursor: pointer;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .2);
            transition: .2s;
        }

        .distance-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: var(--brand-dark);
        }

        .distance-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 10px;
            color: #666;
        }

        /* MODAL: PRICE INPUT WITH SYMBOL */
        .price-input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 0 10px;
            background-color: #fff;
            margin-bottom: 12px;
            transition: .3s;
        }

        .price-input-wrapper:focus-within {
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(166, 58, 0, .2);
        }

        .price-symbol {
            color: #666;
            font-weight: 500;
            margin-right: 8px;
        }

        #reqPrice {
            border: none !important;
            padding: 10px 0 !important;
            margin-bottom: 0 !important;
            width: 100% !important;
            outline: none !important;
            box-shadow: none !important;
        }

        /* Utils */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-buttons button {
            flex: 1;
        }

        .action-buttons button.cancel {
            background: #aaa;
        }

        /* NEW CSS FOR MODE SWITCHING */
        .artist-mode {
            background-color: #f5f3ff;
            transition: background-color 0.5s ease;
        }

        .user-mode {
            background-color: #f3f1ec;
            transition: background-color 0.5s ease;
        }

        /* Preview image: constrain size and preserve aspect ratio */
        #previewImg {
            max-width: 100%;
            width: auto;
            max-height: 50vh;
            object-fit: contain;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin: 10px 0;
            display: none;
        }

        /* Keep action buttons visible inside modal even when content scrolls */
        .modal-actions {
            position: sticky;
            bottom: 0;
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 10px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.96));
        }

        .modal-actions button {
            flex: 1;
        }

        #reqDesc {
            height: 150px;
            min-height: 80px;
        }

        body.artist-mode {
            background-color: #f5f3ff;
            transition: background-color 0.5s ease;
        }

        body.user-mode {
            background-color: #efe8d8;
            transition: background-color 0.5s ease;
        }
    </style>

</head>

<body>

    <div id="navbar-mount"></div>

    <div class="content-wrapper">
        <div class="filter-bar" role="region" aria-label="Filters">
            <button id="btnAll" class="filter-toggle selected" type="button">All Requests</button>
            <button id="btnMy" class="filter-toggle" type="button">My Requests</button>
            <button id="btnForMe" class="filter-toggle" type="button">For Me</button>

            <select id="categorySelect" aria-label="Category">
                <option value="">Select Category</option>
            </select>

            <input id="loc" type="text" placeholder="Location" aria-label="Location" style="padding:12px;">

            <input id="minPrice" type="number" placeholder="Min Price (₹)">
            <input id="maxPrice" type="number" placeholder="Max Price (₹)">

            <button class="apply-btn" id="applyBtn" type="button">Apply Filters</button>
            <button class="clear-btn" id="clearBtn" type="button">Clear</button>
        </div>

        <div class="cards-container" id="cardsContainer">

        </div>
    </div>

    <button class="plus-button" aria-label="Make a Request"
        onclick="document.getElementById('modal').style.display='flex'">
        <i class="fas fa-plus" aria-hidden="true"></i>
    </button>

    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="makeReqTitle"
        onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation();">
            <h3 id="makeReqTitle" style="font-size:1.4em; margin-bottom:15px; color:var(--brand);">Make a Request</h3>
            <input id="reqTitle" type="text" placeholder="Title">

            <input id="reqLoc" type="text" placeholder="Location">

            <div class="price-input-wrapper">
                <span class="price-symbol">₹</span>
                <input id="reqPrice" type="number" placeholder="Price">
            </div>

            <textarea id="reqDesc" placeholder="Description" rows="4"></textarea>
            <input id="reqKeywords" type="text" placeholder="Keywords (comma separated)">
            <select id="reqCat">
                <option value="">Select Category</option>
            </select>

            <input type="file" id="reqImage" accept="image/*" />
            <img id="previewImg" alt="Preview">

            <div class="modal-actions">
                <button id="submitReq" type="button">Submit</button>
                <button type="button" onclick="document.getElementById('modal').style.display='none'"
                    style="background:#aaa;">Close</button>
            </div>

        </div>
    </div>

    <div id="descModal" class="modal-description" role="dialog" aria-modal="true">
        <div class="modal-description-content" id="descContent" onclick="event.stopPropagation();"></div>
    </div>

    <div id="takeDownModal" class="modal-description" role="dialog" aria-modal="true">
        <div class="modal-description-content" onclick="event.stopPropagation();">
            <p>Do you want to take down this request?</p>
            <button id="confirmTakeDownBtn">Yes, Remove</button>
            <button style="background:#aaa;" onclick="closeTakeDown()">Cancel</button>
        </div>
    </div>

    <script type="module">
        import authService from './js/auth.js';

        let currentUser = null;
        let currentRequests = [];
        let currentView = 'general'; // Track current view: 'general', 'my', 'for-me'

        // Helper function to compare user IDs (handles string vs ObjectId)
        function isUserMatch(requesterId, userId) {
            if (!requesterId || !userId) return false;
            const reqId = typeof requesterId === 'object' ? (requesterId._id || requesterId.id || requesterId) : requesterId;
            return String(reqId) === String(userId);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await authService.getCurrentUser();
            if (!currentUser) {
                window.location.href = 'auth.html';
                return;
            }

            // Initialize artist mode from navbar toggle (localStorage)
            const userMode = localStorage.getItem("userMode") || "user";
            document.body.className = userMode === "artist" ? 'artist-mode' : 'user-mode';

            // Override currentUser.artist_mode_enabled based on navbar toggle
            currentUser.artist_mode_enabled = userMode === "artist";

            await loadCategories();
            await loadRequests('general');

            // Image preview handler
            document.getElementById('reqImage').addEventListener('change', function (e) {
                const file = e.target.files[0];
                const preview = document.getElementById('previewImg');
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                } else {
                    preview.style.display = 'none';
                }
            });

            document.getElementById('btnAll').addEventListener('click', () => {
                currentView = 'general';
                updateFilterButtons('btnAll');
                loadRequests('general');
            });
            document.getElementById('btnMy').addEventListener('click', () => {
                currentView = 'my';
                updateFilterButtons('btnMy');
                loadRequests('my');
            });
            document.getElementById('btnForMe').addEventListener('click', () => {
                currentView = 'for-me';
                updateFilterButtons('btnForMe');
                loadRequests('for-me');
            });

            document.getElementById('applyBtn').addEventListener('click', applyFilters);
            document.getElementById('clearBtn').addEventListener('click', clearFilters);
            document.getElementById('submitReq').addEventListener('click', createRequest);

            // Listen for artist mode changes from navbar toggle
            window.addEventListener('storage', (e) => {
                if (e.key === 'userMode') {
                    const newMode = e.newValue || "user";
                    document.body.className = newMode === "artist" ? 'artist-mode' : 'user-mode';
                    currentUser.artist_mode_enabled = newMode === "artist";
                }
            });
        });

        async function loadCategories() {
            try {
                const response = await authService.apiCall('/api/explore/categories');
                if (response.ok) {
                    const categories = await response.json();

                    // Populate both category dropdowns
                    const categorySelect = document.getElementById('categorySelect');
                    const reqCat = document.getElementById('reqCat');

                    categorySelect.innerHTML = '<option value="">Select Category</option>';
                    reqCat.innerHTML = '<option value="">Select Category</option>';

                    categories.forEach(cat => {
                        categorySelect.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                        reqCat.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadRequests(type) {
            try {
                let endpoint = '/api/requests/general';

                if (type === 'my') {
                    endpoint = '/api/requests/my';
                } else if (type === 'for-me') {
                    endpoint = '/api/requests/for-me';
                }

                const response = await authService.apiCall(endpoint);
                if (response.ok) {
                    currentRequests = await response.json();
                    renderRequests(currentRequests);
                } else {
                    console.error('Failed to load requests');
                    currentRequests = [];
                    renderRequests([]);
                }
            } catch (error) {
                console.error('Error loading requests:', error);
                currentRequests = [];
                renderRequests([]);
            }
        }

        function renderRequests(requests) {
            const container = document.getElementById('cardsContainer');

            if (!requests || requests.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 col-span-full py-10">No requests found.</p>';
                return;
            }

            container.innerHTML = requests.map(request => {
                const isOwnRequest = isUserMatch(request.requesterId, currentUser.id) || isUserMatch(request.requesterId, currentUser._id);
                const imageUrl = request.imageUrl || 'assets/images/placeholder.jpg';

                return `
                <div class="card ${isOwnRequest ? 'own-request' : ''}" onclick="showRequestDetails('${request._id || request.id}')">
                    <img src="${imageUrl}" alt="${request.title}" onerror="this.src='assets/images/placeholder.jpg'">
                    <div class="card-content">
                        <span class="category-badge">${request.category || 'General'}</span>
                        <h4>${request.title}</h4>
                        <p><i class="fas fa-map-marker-alt"></i> ${request.location || 'Remote'}</p>
                        <p class="price">₹${request.price || 0}</p>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Make showRequestDetails available globally
        window.showRequestDetails = async function (requestId) {
            const request = currentRequests.find(r => (r._id || r.id) === requestId);
            if (!request) return;

            const isOwnRequest = isUserMatch(request.requesterId, currentUser.id) || isUserMatch(request.requesterId, currentUser._id);

            const descContent = document.getElementById('descContent');
            descContent.innerHTML = `
                <h3 style="color: var(--brand); margin-bottom: 15px;">${request.title}</h3>
                ${request.imageUrl ? `<img src="${request.imageUrl}" alt="${request.title}" style="max-width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; margin-bottom: 15px;">` : ''}
                <p><strong>Category:</strong> ${request.category || 'General'}</p>
                <p><strong>Location:</strong> ${request.location || 'Remote'}</p>
                <p><strong>Price:</strong> ₹${request.price || 0}</p>
                <p><strong>Description:</strong></p>
                <p style="text-align: left; margin-bottom: 15px;">${request.description || 'No description provided.'}</p>
                ${request.keywords && request.keywords.length > 0 ? `<p><strong>Keywords:</strong> ${request.keywords.join(', ')}</p>` : ''}
                
                ${isOwnRequest ? `
                    <div class="action-buttons">
                        <button onclick="deleteRequest('${requestId}')" style="background: #dc2626;">Delete Request</button>
                        <button onclick="closeDescModal()" style="background: #aaa;">Close</button>
                    </div>
                ` : currentView === 'for-me' ? `
                    <div class="action-buttons">
                        <button onclick="acceptRequest('${requestId}')">Accept Request</button>
                        <button onclick="rejectRequest('${requestId}')" style="background: #dc2626;">Reject</button>
                        <button onclick="closeDescModal()" style="background: #aaa;">Close</button>
                    </div>
                ` : `
                    <button onclick="closeDescModal()" style="background: #aaa;">Close</button>
                `}
            `;

            document.getElementById('descModal').style.display = 'flex';
        };

        window.closeDescModal = function () {
            document.getElementById('descModal').style.display = 'none';
        };

        // Close modal when clicking outside
        document.getElementById('descModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeDescModal();
            }
        });

        window.deleteRequest = async function (requestId) {
            if (!confirm('Are you sure you want to delete this request?')) return;

            try {
                const response = await authService.apiCall(`/api/requests/${requestId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    closeDescModal();
                    loadRequests(currentView);
                } else {
                    alert('Failed to delete request');
                }
            } catch (error) {
                console.error('Error deleting request:', error);
                alert('Error deleting request');
            }
        };

        window.acceptRequest = async function (requestId) {
            try {
                const response = await authService.apiCall(`/api/requests/${requestId}/accept`, {
                    method: 'POST'
                });

                if (response.ok) {
                    closeDescModal();
                    alert('Request accepted! You can now chat with the requester.');
                    loadRequests(currentView);
                } else {
                    const error = await response.json();
                    alert('Failed to accept request: ' + (error.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error accepting request:', error);
                alert('Error accepting request');
            }
        };

        window.rejectRequest = async function (requestId) {
            if (!confirm('Are you sure you want to reject this request?')) return;

            try {
                const response = await authService.apiCall(`/api/requests/${requestId}/reject`, {
                    method: 'POST'
                });

                if (response.ok) {
                    closeDescModal();
                    loadRequests(currentView);
                } else {
                    alert('Failed to reject request');
                }
            } catch (error) {
                console.error('Error rejecting request:', error);
                alert('Error rejecting request');
            }
        };

        async function createRequest() {
            const user = await authService.getCurrentUser();
            if (!user) {
                alert('You must be logged in to create a request.');
                window.location.href = 'auth.html';
                return;
            }

            const imageFile = document.getElementById('reqImage').files[0];
            let imageUrl = '';
            if (imageFile) {
                try {
                    const formData = new FormData();
                    formData.append('image', imageFile);

                    const token = localStorage.getItem('token');
                    const uploadResp = await fetch('/api/upload/image', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    if (uploadResp.ok) {
                        const data = await uploadResp.json();
                        imageUrl = data.url;
                    } else {
                        const err = await uploadResp.json();
                        console.error('Upload failed:', err);
                        alert('Failed to upload image: ' + (err.error || 'Unknown error'));
                        return;
                    }
                } catch (error) {
                    console.error('Error uploading image:', error);
                    alert('Failed to upload image');
                    return;
                }
            }

            const requestData = {
                title: document.getElementById('reqTitle').value,
                description: document.getElementById('reqDesc').value,
                category: document.getElementById('reqCat').value,
                keywords: document.getElementById('reqKeywords').value.split(',').map(k => k.trim()).filter(k => k),
                location: document.getElementById('reqLoc').value,
                price: document.getElementById('reqPrice').value,
                imageUrl: imageUrl
            };

            // Validate required fields
            if (!requestData.title || !requestData.description || !requestData.category || !requestData.price) {
                alert('Please fill in all required fields: Title, Description, Category, and Price');
                return;
            }

            try {
                const response = await authService.apiCall('/api/requests', {
                    method: 'POST',
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    document.getElementById('modal').style.display = 'none';

                    // Switch to My Requests view to show the new request
                    currentView = 'my';
                    updateFilterButtons('btnMy');
                    loadRequests('my');

                    // Clear form
                    document.getElementById('reqTitle').value = '';
                    document.getElementById('reqDesc').value = '';
                    document.getElementById('reqLoc').value = '';
                    document.getElementById('reqPrice').value = '';
                    document.getElementById('reqKeywords').value = '';
                    document.getElementById('reqCat').value = '';
                    document.getElementById('reqImage').value = '';
                    document.getElementById('previewImg').style.display = 'none';

                    alert('Request created successfully!');
                } else {
                    const error = await response.json();
                    alert('Failed to create request: ' + (error.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error creating request:', error);
                alert('Error creating request');
            }
        }

        function applyFilters() {
            let filteredRequests = [...currentRequests];
            const category = document.getElementById('categorySelect').value;
            const location = document.getElementById('loc').value.toLowerCase();
            const minPrice = parseFloat(document.getElementById('minPrice').value);
            const maxPrice = parseFloat(document.getElementById('maxPrice').value);

            if (category) {
                filteredRequests = filteredRequests.filter(r => r.category === category);
            }
            if (location) {
                filteredRequests = filteredRequests.filter(r => r.location && r.location.toLowerCase().includes(location));
            }
            if (!isNaN(minPrice)) {
                filteredRequests = filteredRequests.filter(r => r.price >= minPrice);
            }
            if (!isNaN(maxPrice)) {
                filteredRequests = filteredRequests.filter(r => r.price <= maxPrice);
            }

            renderRequests(filteredRequests);
        }

        function clearFilters() {
            document.getElementById('categorySelect').value = '';
            document.getElementById('loc').value = '';
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            renderRequests(currentRequests);
        }

        function updateFilterButtons(activeButtonId) {
            // Remove selected class from all filter buttons
            document.querySelectorAll('.filter-toggle').forEach(btn => {
                btn.classList.remove('selected');
            });
            // Add selected class to the active button
            document.getElementById(activeButtonId).classList.add('selected');
        }

    </script>
    <script type="module" src="js/main.js"></script>
</body>
